<div class="comment-form-wrapper">
  <h3 class="form-title">Оставить комментарий</h3>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="comment-form">
    <mat-form-field appearance="outline" class="full-width-field">
      <mat-label>Ваше имя</mat-label>
      <input matInput formControlName="author" placeholder="Как к вам обращаться?" />
      @if (hasError('author')) {
        <mat-error>{{ getControlError('author') }}</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width-field">
      <mat-label>Комментарий</mat-label>
      <textarea
        matInput
        formControlName="text"
        rows="4"
        placeholder="Что вы думаете об этом?"
      ></textarea>
      @if (hasError('text')) {
        <mat-error>{{ getControlError('text') }}</mat-error>
      }
    </mat-form-field>

    <div>
      <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">
        Отправить
      </button>
    </div>
  </form>
</div>
