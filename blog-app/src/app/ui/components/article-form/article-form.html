<section id="add-article-section" class="add-article-section container">
  <div class="add-article-wrapper">
    <h2 class="section-title">Добавить статью</h2>

    <form id="add-article-form" class="admin-form">
      <div class="form-group-light">
        <label for="article-title">Заголовок</label>
        <input type="text" id="article-title" placeholder="Заголовок статьи" required />
      </div>

      <div class="form-group-light">
        <label for="article-content">Текст статьи</label>
        <textarea id="article-content" rows="6" placeholder="Текст статьи" required></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-solid">Добавить</button>
        <button type="button" id="btn-cancel" class="btn-outline-light">Отмена</button>
      </div>
    </form>
  </div>
</section>
