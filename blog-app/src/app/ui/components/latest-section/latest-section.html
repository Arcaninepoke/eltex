<section class="latest-posts-section container">
  <h2 class="section-title">Последние статьи</h2>

  @for (article of articles; track article.id) {
    <article class="post-card">
      <div class="post-content">
        <span class="post-category">(Категории будут добавлены позже)</span>
        <h3 class="post-title">{{ article.title }}</h3>
        <p class="post-desc">{{ article.content }}</p>
      </div>
      <div class="post-image">
        <img [src]="article.image" [alt]="article.alt" />
      </div>
    </article>
  }

  <div class="all-posts-link">
    <a href="blog.html" class="btn-outline">Все статьи</a>
  </div>
</section>
