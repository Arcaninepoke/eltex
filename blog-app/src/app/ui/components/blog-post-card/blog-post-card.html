<article class="grid-post">
  <div class="post-actions">
    <button mat-icon-button class="action-btn edit-btn" title="Редактировать" (click)="onEdit()">
      <mat-icon>edit</mat-icon>
    </button>
    <button mat-icon-button class="action-btn delete-btn" title="Удалить" (click)="onDelete()">
      <mat-icon>delete</mat-icon>
    </button>
  </div>

  <a [routerLink]="['/blog', article().id]">
    <img [src]="article().image" [alt]="article().alt" />
  </a>

  <a [routerLink]="['/blog', article().id]" class="post-title-link">
    <h3 class="grid-post-title">
      {{ article().title }}
    </h3>
  </a>

  @if (article().categoryName) {
    <span class="post-category">{{ article().categoryName }}</span>
  }

  <p class="post-date">
    Опубликовано: <time [attr.datetime]="article().date">{{ article().displayDate }}</time>
  </p>
</article>
